<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Image Markup</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  
  <div id="drop-zone" class="empty-state">
    <div class="empty-content">
      <div class="icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
      </div>
      <h2>Upload or Paste Image</h2>
      <p>Drag & drop, paste from clipboard (Cmd+V), or click to browse</p>
      <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" hidden>
      <button class="primary-btn" id="btn-browse">Browse Files</button>
    </div>
  </div>

  <div id="app-container" class="hidden">
    <aside id="toolbar" class="toolbar glass-panel">
      <div class="toolbar-brand">
        <h2>Markup</h2>
      </div>

      <div class="tool-section">
        <span class="section-label">Tools</span>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="select" title="Select (Move/Resize/Delete)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
          </button>
          <button class="tool-btn" data-tool="draw" title="Freehand Draw">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="arrow" title="Arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
          </button>
          <button class="tool-btn" data-tool="circle" title="Circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg>
          </button>
          <button class="tool-btn" data-tool="text" title="Text">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
          </button>
        </div>
      </div>

      <div class="tool-section">
        <span class="section-label">Properties</span>
        
        <div class="prop-group">
          <label>Color</label>
          <div class="color-picker-wrapper">
            <input type="color" id="color-picker" value="#ff3366">
            <div class="color-swatches">
              <button class="swatch" data-color="#ff3366" style="background: #ff3366;"></button>
              <button class="swatch" data-color="#00cc99" style="background: #00cc99;"></button>
              <button class="swatch" data-color="#3399ff" style="background: #3399ff;"></button>
              <button class="swatch" data-color="#ffcc00" style="background: #ffcc00;"></button>
              <button class="swatch" data-color="#ffffff" style="background: #ffffff;"></button>
              <button class="swatch" data-color="#111111" style="background: #111111;"></button>
            </div>
          </div>
        </div>

        <div class="prop-group">
          <label>Thickness: <span id="thickness-val">10</span>px</label>
          <input type="range" id="thickness-slider" min="1" max="50" value="10">
        </div>

        <div class="prop-group" id="font-prop-group" style="display: none;">
          <label>Font</label>
          <select id="font-select" class="styled-select" style="font-family: Inter;">
            <option value="Inter" style="font-family: Inter;">Inter</option>
            <option value="Arial" style="font-family: Arial;">Arial</option>
            <option value="Courier New" style="font-family: 'Courier New';">Courier New</option>
            <option value="Georgia" style="font-family: Georgia;">Georgia</option>
            <option value="Impact" style="font-family: Impact;">Impact</option>
            <option value="Times New Roman" style="font-family: 'Times New Roman';">Times</option>
            <option value="Verdana" style="font-family: Verdana;">Verdana</option>
          </select>
        </div>
      </div>

      <div class="tool-section no-border">
        <span class="section-label">Actions</span>
        <div class="action-grid">
          <button id="btn-delete" class="action-btn" title="Delete Selected">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
          <button id="btn-expand" class="action-btn" title="Expand Padding">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>
          </button>
          <button id="btn-reset" class="action-btn danger" title="Reset/Restart">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
          </button>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="export-actions">
        <button id="btn-copy" class="export-btn secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy
        </button>
        <button id="btn-download" class="export-btn primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Download
        </button>
      </div>

    </aside>

    <main class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="markup-canvas"></canvas>
    </main>
  </div>

  <script src="fabric.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
